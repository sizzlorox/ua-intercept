name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  audit:
    name: Dependency audit (CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The shipped extension has zero runtime dependencies, so the production
      # audit must be clean (blocking). Dev deps (vitest) are reported but
      # non-blocking so a transitive dev advisory doesn't wedge every PR.
      - name: Audit production dependencies (blocking)
        run: npm audit --omit=dev --audit-level=low
      - name: Audit all dependencies (report only)
        run: npm audit --audit-level=high || true

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # let gitleaks annotate the PR
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit
          persist-credentials: false
      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
