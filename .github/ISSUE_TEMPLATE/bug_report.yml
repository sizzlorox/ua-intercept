name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! For **security vulnerabilities**, do not file a public issue — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: With a "full" iPhone Safari profile active, navigator.userAgent still shows Chrome on example.com…
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1. Create a profile …
        2. Enable it …
        3. Visit …
        4. See …
    validations:
      required: true
  - type: dropdown
    id: depth
    attributes:
      label: Spoof depth
      options:
        - "headers"
        - "full"
        - "N/A"
    validations:
      required: true
  - type: input
    id: chrome-version
    attributes:
      label: Chrome / Chromium version
      placeholder: "131.0.6778.140 on Windows 11"
    validations:
      required: true
  - type: input
    id: ext-version
    attributes:
      label: UA Intercept version / commit
      placeholder: "0.1.0 (or a commit SHA)"
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Service worker / console errors
      description: From chrome://extensions → the extension → "service worker" → Console, and the page console if relevant.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for a duplicate.
          required: true
        - label: This is not a known limitation (Web Workers, detectability, about:blank frames — see the README).
          required: true
