name: Feature request
description: Suggest an improvement to the UA experience
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        UA Intercept is intentionally narrow — **User-Agent + matching Client Hints only**. Requests that broaden that single purpose (general header editing, cookies, redirects, cloud sync) are out of scope by design.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This stays within "User-Agent + Client Hints" (not general header editing).
          required: true
